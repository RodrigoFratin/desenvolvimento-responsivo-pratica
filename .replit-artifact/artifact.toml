kind = "web"
previewPath = "/"
title = "Blocos Responsivos"
version = "1.0.0"
id = "artifacts/blocos-responsivos"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 20024
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/blocos-responsivos run dev"

[services.env]
PORT = "20024"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/blocos-responsivos", "run", "build"]
publicDir = "artifacts/blocos-responsivos/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
